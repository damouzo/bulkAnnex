    <rect x="27" y="17" width="5" height="27" rx="1.5" fill="rgba(255,255,255,0.88)"/>
    <rect x="34" y="24" width="5" height="20" rx="1.5" fill="rgba(238,239,224,0.75)"/>
    <!-- Trend line across tops -->
