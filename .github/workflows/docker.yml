name: Build and push Docker image to DockerHub

# Triggered when a version tag is pushed (e.g. git tag v1.0.0 && git push --tags)
# Also allows manual trigger from the Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag name (v1.0.0 → 1.0.0)
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bulkannex_r
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.tag, 'dev') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: containers/bulkannex_r
          file: containers/bulkannex_r/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers across builds to speed up repeat pushes
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  # Optional: after the Docker image is pushed, post a reminder to update
  # nextflow.config params.container to the new DockerHub tag.
  remind:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Reminder
        run: |
          echo "=== Next step ==="
          echo "Update nextflow.config:"
          echo "  params.container = \"docker.io/${{ secrets.DOCKERHUB_USERNAME }}/bulkannex_r:${{ needs.build-and-push.outputs.tag || 'latest' }}\""
